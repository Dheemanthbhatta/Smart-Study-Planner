<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart AI Study Planner | Dheemanth Bhatta</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="brand">
                <div class="brand-icon">AI</div>
                <span>Study Planner</span>
            </div>
            
            <nav class="nav-menu">
                <button class="nav-item active" data-view="dashboard">
                    Dashboard
                </button>
                <button class="nav-item" data-view="tasks">
                    Tasks
                </button>
                <button class="nav-item" data-view="schedule">
                    Schedule
                </button>
            </nav>

            <div class="sidebar-footer">
                <button id="themeToggle" class="nav-item">🌙 Dark Mode</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1 id="viewTitle">Dashboard</h1>
                <button id="openModal" class="btn-primary">
                    + Add New Task
                </button>
            </header>

            <div class="ai-insight-box">
                <div class="ai-sparkle">✨</div>
                <p id="ai-message">Analyzing your study patterns...</p>
            </div>

            <div id="dashboard-view" class="view-section">
                <div class="stats-container">
                    <div class="stat-card">
                        <span class="label">Total Tasks</span>
                        <span class="value" id="total-tasks">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="label">Pending</span>
                        <span class="value" id="pending-tasks">0</span>
                    </div>
                    <div class="stat-card">
                        <span class="label">Completed</span>
                        <span class="value" id="completed-tasks">0</span>
                    </div>
                </div>
                <div class="chart-wrapper">
                    <canvas id="taskChart"></canvas>
                </div>
            </div>

            <div id="tasks-view" class="view-section hidden">
                <div id="taskGrid" class="task-grid">
                    </div>
            </div>

            <div id="schedule-view" class="view-section hidden">
                <div class="timetable-card">
                    <h3 style="margin-bottom: 20px;">Smart Timetable</h3>
                    <div id="scheduleList" class="schedule-list">
                        </div>
                </div>
            </div>
        </main>
    </div>

    <div id="taskModal" class="modal-overlay">
        <div class="modal-card">
            <header class="modal-header">
                <h2>Create New Task</h2>
                <button id="closeModal" class="close-btn">&times;</button>
            </header>
            
            <form id="taskForm">
                <div class="form-group">
                    <label for="taskTitle">Task Title</label>
                    <input type="text" id="taskTitle" placeholder="e.g., Study Adversarial ML" required>
                </div>
                
                <div class="form-row" style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label for="taskType">Category</label>
                        <select id="taskType">
                            <option value="Study">Study Session</option>
                            <option value="Assignment">Assignment</option>
                            <option value="Event">Exam/Event</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label for="taskPriority">Priority</label>
                        <select id="taskPriority">
                            <option value="High">High</option>
                            <option value="Medium" selected>Medium</option>
                            <option value="Low">Low</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="taskDeadline">Deadline</label>
                    <input type="datetime-local" id="taskDeadline" required>
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px; justify-content: center;">
                    Save to Planner
                </button>
            </form>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
